version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || (nvm install 20 && nvm use 20)
        - node --version
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
